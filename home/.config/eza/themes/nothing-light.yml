colourful: true

filekinds:
  normal:
    foreground: "#111111"
  directory:
    foreground: "#1050A0"
    is_bold: true
  symlink:
    foreground: "#006E6E"
  pipe:
    foreground: "#7A4A00"
  socket:
    foreground: "#5A2D9A"
  block_device:
    foreground: "#7A4A00"
  char_device:
    foreground: "#7A4A00"
  executable:
    foreground: "#1E6B3C"
