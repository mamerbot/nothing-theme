    foreground: "#1E6B3C"
  user_write:
    foreground: "#7A4A00"
  user_execute_file:
    foreground: "#1050A0"
  user_execute_other:
    foreground: "#1050A0"
  group_read:
    foreground: "#1E6B3C"
  group_write:
    foreground: "#7A4A00"
