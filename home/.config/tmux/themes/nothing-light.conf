# Nothing Light tmux theme

set -g status-style "fg=#1A1A1A,bg=#FFFFFF"
set -g status-left-style "fg=#FFFFFF,bg=#007AFF,bold"
set -g status-right-style "fg=#1A1A1A,bg=#F0F0F0"
set -g window-status-style "fg=#666666,bg=#FFFFFF"
set -g window-status-current-style "fg=#FFFFFF,bg=#007AFF,bold"
set -g window-status-activity-style "fg=#D4A843,bg=#FFFFFF"
set -g window-status-bell-style "fg=#FFFFFF,bg=#D71921,bold"
set -g pane-border-style "fg=#E8E8E8"
set -g pane-active-border-style "fg=#007AFF"
set -g message-style "fg=#1A1A1A,bg=#F0F0F0"
set -g message-command-style "fg=#1A1A1A,bg=#CCCCCC"
set -g mode-style "fg=#FFFFFF,bg=#D4A843"
set -g clock-mode-colour "#007AFF"
set -g popup-style "fg=#1A1A1A,bg=#FFFFFF"
set -g popup-border-style "fg=#E8E8E8"
set -g display-panes-colour "#D4A843"
set -g display-panes-active-colour "#007AFF"
