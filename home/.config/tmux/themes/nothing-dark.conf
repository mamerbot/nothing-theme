# Nothing Dark tmux theme

set -g status-style "fg=#E8E8E8,bg=#000000"
set -g status-left-style "fg=#000000,bg=#5B9BF6,bold"
set -g status-right-style "fg=#E8E8E8,bg=#111111"
set -g window-status-style "fg=#999999,bg=#000000"
set -g window-status-current-style "fg=#000000,bg=#5B9BF6,bold"
set -g window-status-activity-style "fg=#D4A843,bg=#000000"
set -g window-status-bell-style "fg=#FFFFFF,bg=#D71921,bold"
set -g pane-border-style "fg=#222222"
set -g pane-active-border-style "fg=#5B9BF6"
set -g message-style "fg=#E8E8E8,bg=#000000"
set -g message-command-style "fg=#E8E8E8,bg=#333333"
set -g mode-style "fg=#000000,bg=#D4A843"
set -g clock-mode-colour "#5B9BF6"
set -g popup-style "fg=#E8E8E8,bg=#000000"
set -g popup-border-style "fg=#222222"
set -g display-panes-colour "#D4A843"
set -g display-panes-active-colour "#5B9BF6"
